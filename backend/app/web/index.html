<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据采集工作台</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div class="background-grid" aria-hidden="true"></div>
  <main class="shell">
    <section class="hero">
      <div class="hero-copy">
        <p class="eyebrow">工作流控制台</p>
        <h1>直接在后端里完成文章采集、抓取与预览。</h1>
        <p class="hero-text">
          在一个页面里发起预览任务、检查适配器可用性，并查看最近的排序结果。
        </p>
      </div>
      <div class="hero-status" id="healthBadge">正在检查接口状态...</div>
    </section>

    <section class="layout">
      <article class="panel control-panel">
        <div class="panel-head">
          <h2>运行预览</h2>
          <button id="refreshSourcesButton" class="ghost-button" type="button">刷新数据源</button>
        </div>
        <form id="previewForm" class="preview-form">
          <label>
            关键词
            <textarea id="keywordsInput" rows="4" placeholder="AI Agent&#10;半导体&#10;储能">AI Agent
Semiconductor</textarea>
          </label>

          <div class="two-up">
            <label>
              发现源
              <select id="discoverySource"></select>
            </label>
            <label>
              抓取源
              <select id="fetchSource"></select>
            </label>
          </div>

          <div class="three-up">
            <label>
              采集上限
              <input id="limitInput" type="number" min="1" max="100" value="5">
            </label>
            <label>
              排名前 K
              <input id="topKInput" type="number" min="1" max="50" value="3">
            </label>
            <label class="toggle-wrap">
              失败回退到 Mock
              <input id="fallbackInput" type="checkbox" checked>
            </label>
          </div>

          <button id="runButton" class="primary-button" type="submit">开始预览</button>
        </form>
        <p class="status-line" id="formStatus">空闲中。</p>
      </article>

      <article class="panel">
        <div class="panel-head">
          <h2>数据源</h2>
          <button id="refreshJobsButton" class="ghost-button" type="button">刷新任务</button>
        </div>
        <div id="sourcesGrid" class="source-grid"></div>
      </article>
    </section>

    <section class="layout">
      <article class="panel result-panel">
        <div class="panel-head">
          <h2>最近一次预览</h2>
          <span class="subtle" id="latestPreviewMeta">还没有运行记录。</span>
        </div>
        <div id="previewSummary" class="summary-grid"></div>
        <div id="hotArticles" class="article-list empty-state">运行一次预览后，这里会显示排序结果。</div>
      </article>

      <article class="panel jobs-panel">
        <div class="panel-head">
          <h2>最近任务</h2>
          <span class="subtle" id="jobsMeta">正在等待数据。</span>
        </div>
        <div id="jobsList" class="job-list empty-state">还没有加载任务。</div>
      </article>
    </section>
  </main>

  <template id="sourceCardTemplate">
    <article class="source-card">
      <div class="source-top">
        <span class="pill"></span>
        <span class="kind"></span>
      </div>
      <h3></h3>
      <p></p>
    </article>
  </template>

  <script src="/assets/app.js" defer></script>
</body>
</html>
